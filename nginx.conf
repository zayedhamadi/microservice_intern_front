server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.csr.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Angular routing: always fall back to index.csr.html
    location / {
        try_files $uri /index.csr.html;
    }

    # REST API -> gateway
    location /stage/ {
        proxy_pass http://gateway:8080/stage/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (STOMP over SockJS/native) -> gateway
    location /ws/ {
        proxy_pass http://gateway:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    error_page 404 /index.csr.html;
}