<!-- callback.component.html -->
<div class="cb-wrap">
    <div class="cb-bg-circle c1"></div>
    <div class="cb-bg-circle c2"></div>
    <div class="cb-bg-circle c3"></div>

    <div class="cb-card">

        <!-- Logo -->
        <div class="cb-logo">
            <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
                <path d="M8 8L16 4L24 8V16C24 21 16 28 16 28S8 21 8 16V8Z" fill="#4f46e5" />
                <path d="M12 16L15 19L20 13" stroke="white" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>

        <!-- Spinner -->
        <div class="cb-spinner-wrap">
            <div class="cb-ring cb-ring-1"></div>
            <div class="cb-ring cb-ring-2"></div>
            <div class="cb-ring cb-ring-3"></div>
            <div class="cb-center">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
        </div>

        <!-- Title & message -->
        <h2 class="cb-title">Connexion en cours</h2>
        <p class="cb-msg">{{ message }}</p>

        <!-- Steps -->
        <div class="cb-steps">

            <div class="cb-step" [class.done]="stepIndex > 0" [class.active]="stepIndex === 0">
                <div class="cb-step-dot"></div>
                <span>Échange du code OAuth</span>
                <svg *ngIf="stepIndex > 0" class="cb-check" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>

            <div class="cb-step" [class.done]="stepIndex > 1" [class.active]="stepIndex === 1">
                <div class="cb-step-dot"></div>
                <span>Synchronisation du profil</span>
                <svg *ngIf="stepIndex > 1" class="cb-check" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>

            <div class="cb-step" [class.done]="stepIndex > 2" [class.active]="stepIndex === 2">
                <div class="cb-step-dot"></div>
                <span>Redirection vers l'application</span>
                <svg *ngIf="stepIndex > 2" class="cb-check" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>

        </div>

        <!-- Brand -->
        <div class="cb-brand">SkillExchange</div>

    </div>
</div>
